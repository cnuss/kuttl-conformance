name: Conformance Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── discover test suites ──────────────────────────────────────────
  matrix:
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.gen.outputs.suites }}
    steps:
      - uses: actions/checkout@v5

      - id: gen
        run: eval make matrix

  # ── run each suite in parallel ────────────────────────────────────
  test:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.matrix.outputs.suites) }}
    name: ${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v5

      - uses: kyverno/action-install-chainsaw@v0.2.14

      - uses: helm/kind-action@v1.12.0

      - name: Run ${{ matrix.suite }} suite
        run: make test SUITE=${{ matrix.suite }} KIND=false

      - name: Export KIND logs
        if: failure()
        run: kind export logs kind-logs-ci --name chart-testing

      - name: Upload KIND logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs-${{ matrix.suite }}
          path: kind-logs-ci/
          retention-days: 7
