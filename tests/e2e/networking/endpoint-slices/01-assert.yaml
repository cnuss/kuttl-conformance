apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: events
    namespace: $NAMESPACE
commands:
  - script: |
      set -e
      slice_count=$(kubectl get endpointslices -n $NAMESPACE -l kubernetes.io/service-name=nginx-svc --no-headers | wc -l)
      test "$slice_count" -ge 1
  - script: |
      set -e
      endpoint_count=$(kubectl get endpointslices -n $NAMESPACE -l kubernetes.io/service-name=nginx-svc -o jsonpath='{range .items[0].endpoints[*]}{.addresses[0]}{"\n"}{end}' | grep -c .)
      test "$endpoint_count" -ge 2
