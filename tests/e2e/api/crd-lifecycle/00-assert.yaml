apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
collectors:
  - type: events
    namespace: $NAMESPACE
commands:
  - script: |
      set -e
      # Wait for CRD to be fully established and API endpoint available
      for i in $(seq 1 30); do
        if kubectl get crd testwidgets.conformance.kuttl.dev -o jsonpath='{.status.conditions[?(@.type=="Established")].status}' | grep -q True; then
          # Also verify the API endpoint is actually serving
          if kubectl get testwidgets.conformance.kuttl.dev -n $NAMESPACE 2>/dev/null; then
            echo "CRD established and API ready"
            exit 0
          fi
        fi
        sleep 1
      done
      echo "CRD not established in time"
      exit 1
