apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 90
collectors:
  - type: events
    namespace: $NAMESPACE
commands:
  - script: |
      set -e
      if kubectl get namespace kuttl-ns-test-${NAMESPACE##*-} 2>/dev/null; then
        echo "Namespace still exists"
        exit 1
      fi
      echo "Namespace deleted successfully"
