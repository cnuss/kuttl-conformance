apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
collectors:
  - type: events
    namespace: $NAMESPACE
commands:
  - script: |
      set -e
      # Verify the ConfigMap still exists (finalizer blocks deletion)
      kubectl get configmap finalized-config -n $NAMESPACE
      # Verify it has a deletionTimestamp
      ts=$(kubectl get configmap finalized-config -n $NAMESPACE -o jsonpath='{.metadata.deletionTimestamp}')
      test -n "$ts"
