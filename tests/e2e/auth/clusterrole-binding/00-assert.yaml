apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
collectors:
  - type: events
    namespace: $NAMESPACE
commands:
  - script: |
      set -e
      kubectl get serviceaccount ns-lister -n $NAMESPACE
      kubectl get clusterrole ns-lister-role-$NAMESPACE
      kubectl get clusterrolebinding ns-lister-binding-$NAMESPACE
