---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-http
  template:
    metadata:
      labels:
        app: smoke-http
    spec:
      containers:
        - name: http
          image: python:3-alpine
          command: ["python3", "-m", "http.server", "8000"]
          ports:
            - containerPort: 8000
