# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: smoke
spec:
  description: Smoke test for core resources and deployment
  steps:
  - name: python-http-server
    description: Run a python3 http.server pod and verify it reaches Running
    try:
    - apply:
        file: 00-resources.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: create-resources
    description: Create SA, Role, RoleBinding, ConfigMap, Secret, PVC, and Deployment
    try:
    - apply:
        file: 01-resources.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - events: {}
