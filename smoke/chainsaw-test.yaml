# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: smoke
spec:
  description: Smoke test for core resources and deployment
  steps:
  - name: create-resources
    description: Create SA, Role, RoleBinding, ConfigMap, Secret, PVC, and Deployment
    try:
    - apply:
        file: resources.yaml
    - assert:
        file: assert.yaml
    catch:
    - events: {}
