---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-map
data:
  hello: "world"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-subpath
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-subpath
  template:
    metadata:
      labels:
        app: smoke-subpath
    spec:
      initContainers:
        - name: assert-subpath
          image: busybox
          command: ["grep", "-qx", "world", "/etc/hello"]
          volumeMounts:
            - name: cm
              mountPath: /etc/hello
              subPath: hello
      containers:
        - name: pause
          image: busybox
          command: ["sleep", "3600"]
      volumes:
        - name: cm
          configMap:
            name: config-map
