# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: service-nodeport
spec:
  description: Validates NodePort Service allocates a port in the valid range and populates endpoints
  steps:
  - name: create-nodeport-service
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-nodeport-and-endpoints
    try:
    - script:
        content: |
          set -e
          node_port=$(kubectl get svc nginx-nodeport -n $NAMESPACE -o jsonpath='{.spec.ports[0].nodePort}')
          test "$node_port" -ge 30000
          test "$node_port" -le 32767
    - script:
        content: |
          set -e
          addr_count=$(kubectl get endpoints nginx-nodeport -n $NAMESPACE -o jsonpath='{.subsets[0].addresses[*].ip}' | wc -w)
          test "$addr_count" -eq 1
    catch:
    - events: {}
  - name: verify-connectivity
    try:
    - script:
        content: |
          set -e
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          NODE_PORT=$(kubectl get svc nginx-nodeport -n $NAMESPACE -o jsonpath='{.spec.ports[0].nodePort}')
          kubectl run wget-test --rm -i --restart=Never --image=busybox:1.37 -n $NAMESPACE -- \
            wget -qO- --timeout=10 http://$NODE_IP:$NODE_PORT
    catch:
    - events: {}
