# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ingress
spec:
  description: Validates Ingress resource creation with host and path routing rules
  steps:
  - name: create-and-verify-ingress
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-backend-connectivity
    try:
    - script:
        content: |
          set -e
          kubectl run wget-test --rm -i --restart=Never --image=busybox:1.37 -n $NAMESPACE -- \
            wget -qO- --timeout=10 http://web.$NAMESPACE:80
    catch:
    - events: {}
