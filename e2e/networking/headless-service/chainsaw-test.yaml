# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: headless-service
spec:
  description: Validates headless Service returns individual pod IPs instead of a virtual cluster IP
  steps:
  - name: create-headless-service
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-endpoint-addresses
    try:
    - script:
        content: |
          set -e
          addr_count=$(kubectl get endpoints nginx-headless -n $NAMESPACE -o jsonpath='{.subsets[0].addresses[*].ip}' | wc -w)
          test "$addr_count" -eq 2
    catch:
    - events: {}
  - name: verify-dns-and-connectivity
    try:
    - script:
        content: |
          set -e
          kubectl run dns-test --rm -i --restart=Never --image=busybox:1.37 -n $NAMESPACE -- \
            sh -c 'nslookup nginx-headless 2>/dev/null | grep -q "Name:"'
    - script:
        content: |
          set -e
          kubectl run wget-test --rm -i --restart=Never --image=busybox:1.37 -n $NAMESPACE -- \
            wget -qO- --timeout=10 http://nginx-headless.$NAMESPACE:80
    catch:
    - events: {}
