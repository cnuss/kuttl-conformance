# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: service-clusterip
spec:
  description: Validates ClusterIP Service creation and endpoint population from backing pods
  steps:
  - name: create-clusterip-service
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-endpoints
    try:
    - script:
        content: |
          set -e
          addr_count=$(kubectl get endpoints nginx-clusterip -n $NAMESPACE -o jsonpath='{.subsets[0].addresses[*].ip}' | wc -w)
          test "$addr_count" -eq 2
    catch:
    - events: {}
  - name: verify-connectivity
    try:
    - script:
        content: |
          set -e
          kubectl run wget-test --rm -i --restart=Never --image=busybox:1.37 -n $NAMESPACE -- \
            wget -qO- --timeout=10 http://nginx-clusterip.$NAMESPACE:80
    catch:
    - events: {}
