# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: pod-lifecycle-volumes
spec:
  description: Validates pod lifecycle with a persistent volume
  namespace: chainsaw-pod-lifecycle-volumes
  steps:
  - name: create-and-verify-running
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-volume-data
    try:
    - script:
        content: |
          set -e
          pvc=$(kubectl exec nginx -n $NAMESPACE -- cat /pvc/started.txt)
          echo "--- /pvc/started.txt (persistent) ---"
          echo "$pvc"
          echo "---"
          test "$(echo "$pvc" | wc -l)" -ge 1
          scratch=$(kubectl exec nginx -n $NAMESPACE -- cat /scratch/started.txt)
          echo "--- /scratch/started.txt (emptyDir) ---"
          echo "$scratch"
          echo "---"
          test "$(echo "$scratch" | wc -l)" -eq 1
    catch:
    - events: {}
  - name: delete-and-verify-gone
    try:
    - delete:
        ref:
          apiVersion: v1
          kind: Pod
          name: nginx
    - error:
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            name: nginx
    catch:
    - events: {}
