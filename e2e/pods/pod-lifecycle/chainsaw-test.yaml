# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: pod-lifecycle
spec:
  description: Validates pod lifecycle phases from creation through deletion
  steps:
  - name: create-and-verify-running
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: delete-and-verify-gone
    try:
    - delete:
        ref:
          apiVersion: v1
          kind: Pod
          name: nginx
    - error:
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            name: nginx
    catch:
    - events: {}
