apiVersion: v1
kind: Pod
metadata:
  name: sc-readonly-root
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          # Writing to root filesystem should fail
          ! touch /testfile 2>/dev/null
          # Writing to emptyDir should succeed
          touch /tmp/writable/testfile
      securityContext:
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: writable
          mountPath: /tmp/writable
  volumes:
    - name: writable
      emptyDir: {}
