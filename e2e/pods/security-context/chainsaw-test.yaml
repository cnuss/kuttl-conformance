# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: security-context
spec:
  description: Validates pod and container security contexts including runAsUser, readOnlyRootFilesystem, and privilege drop
  steps:
  - name: verify-runas-user
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-readonly-rootfs
    try:
    - apply:
        file: 01-install.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - events: {}
  - name: verify-privilege-drop
    try:
    - apply:
        file: 02-install.yaml
    - assert:
        file: 02-assert.yaml
    catch:
    - events: {}
