apiVersion: v1
kind: Pod
metadata:
  name: poststart-hook
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          # postStart runs in parallel with the command, so wait briefly
          for i in $(seq 1 10); do
            test -f /tmp/poststart-done && exit 0
            sleep 1
          done
          echo "FAIL: postStart hook did not create /tmp/poststart-done"
          exit 1
      lifecycle:
        postStart:
          exec:
            command: ["sh", "-c", "touch /tmp/poststart-done"]
