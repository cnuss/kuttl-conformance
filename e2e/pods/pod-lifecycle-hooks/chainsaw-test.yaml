# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: pod-lifecycle-hooks
spec:
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
  - catch:
    - podLogs:
        name: prestop-hook
        tail: 20
    name: step-01
    try:
    - apply:
        file: 01-install.yaml
    - assert:
        file: 01-assert.yaml
  - name: step-02
    try:
    - script:
        content: |
          set -e
          kubectl delete pod prestop-hook -n $NAMESPACE --wait=false
          sleep 2
          ts=$(kubectl get pod prestop-hook -n $NAMESPACE -o jsonpath='{.metadata.deletionTimestamp}')
          test -n "$ts"
          echo "preStop hook is running: pod has deletionTimestamp=$ts but is not yet gone"
          kubectl wait --for=delete pod/prestop-hook -n $NAMESPACE --timeout=60s
          echo "Pod fully terminated after preStop hook completed"
