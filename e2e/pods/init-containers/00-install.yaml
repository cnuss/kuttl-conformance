apiVersion: v1
kind: Pod
metadata:
  name: init-single
spec:
  restartPolicy: Never
  initContainers:
    - name: init-writer
      image: busybox:1.37
      command: ["sh", "-c", "echo hello-from-init > /work/init-message"]
      volumeMounts:
        - name: shared
          mountPath: /work
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          test "$(cat /work/init-message)" = "hello-from-init"
      volumeMounts:
        - name: shared
          mountPath: /work
  volumes:
    - name: shared
      emptyDir: {}
---
apiVersion: v1
kind: Pod
metadata:
  name: init-multi
spec:
  restartPolicy: Never
  initContainers:
    - name: init-1
      image: busybox:1.37
      command: ["sh", "-c", "echo content-from-init-1 > /work/file-1"]
      volumeMounts:
        - name: shared
          mountPath: /work
    - name: init-2
      image: busybox:1.37
      command: ["sh", "-c", "echo content-from-init-2 > /work/file-2"]
      volumeMounts:
        - name: shared
          mountPath: /work
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          test "$(cat /work/file-1)" = "content-from-init-1"
          test "$(cat /work/file-2)" = "content-from-init-2"
      volumeMounts:
        - name: shared
          mountPath: /work
  volumes:
    - name: shared
      emptyDir: {}
