# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: deployment-strategy
spec:
  steps:
  - catch:
    - podLogs:
        selector: app=nginx-recreate
        tail: 20
    - events: {}
    name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
  - catch:
    - podLogs:
        selector: app=nginx-recreate
        tail: 20
    - events: {}
    name: step-01
    try:
    - apply:
        file: 01-update.yaml
    - assert:
        file: 01-assert.yaml
  - catch:
    - podLogs:
        selector: app=nginx-rolling
        tail: 20
    - events: {}
    name: step-02
    try:
    - apply:
        file: 02-install-rolling.yaml
    - assert:
        file: 02-assert.yaml
  - catch:
    - podLogs:
        selector: app=nginx-rolling
        tail: 20
    - events: {}
    name: step-03
    try:
    - apply:
        file: 03-update-rolling.yaml
    - assert:
        file: 03-assert.yaml
