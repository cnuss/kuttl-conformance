# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: deployment-strategy
spec:
  steps:
  - catch:
    - podLogs:
        selector: app=nginx-recreate
        tail: 20
    - events: {}
    name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
  - catch:
    - podLogs:
        selector: app=nginx-recreate
        tail: 20
    - events: {}
    name: step-01
    try:
    - apply:
        file: 01-update.yaml
    - assert:
        file: 01-assert.yaml
    - script:
        timeout: 60s
        content: |
          set -e
          kubectl rollout status deployment/nginx-recreate -n $NAMESPACE --timeout=60s
          for i in $(seq 1 15); do
            bad=0
            for img in $(kubectl get pods -n $NAMESPACE -l app=nginx-recreate -o jsonpath='{.items[?(@.metadata.deletionTimestamp=="")].spec.containers[0].image}' 2>/dev/null); do
              if [ "$img" != "nginx:1.27-alpine" ]; then bad=1; break; fi
            done
            if [ "$bad" -eq 0 ]; then exit 0; fi
            sleep 1
          done
          echo "FAIL: not all pods running updated image"
          exit 1
  - catch:
    - podLogs:
        selector: app=nginx-rolling
        tail: 20
    - events: {}
    name: step-02
    try:
    - apply:
        file: 02-install-rolling.yaml
    - assert:
        file: 02-assert.yaml
  - catch:
    - podLogs:
        selector: app=nginx-rolling
        tail: 20
    - events: {}
    name: step-03
    try:
    - apply:
        file: 03-update-rolling.yaml
    - assert:
        file: 03-assert.yaml
    - script:
        timeout: 60s
        content: |
          set -e
          kubectl rollout status deployment/nginx-rolling -n $NAMESPACE --timeout=60s
          for i in $(seq 1 15); do
            bad=0
            for img in $(kubectl get pods -n $NAMESPACE -l app=nginx-rolling -o jsonpath='{.items[?(@.metadata.deletionTimestamp=="")].spec.containers[0].image}' 2>/dev/null); do
              if [ "$img" != "nginx:1.27-alpine" ]; then bad=1; break; fi
            done
            if [ "$bad" -eq 0 ]; then exit 0; fi
            sleep 1
          done
          echo "FAIL: not all pods running updated image"
          exit 1
