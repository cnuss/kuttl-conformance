# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: deployment-lifecycle
spec:
  description: Validates deployment creation, scaling, and rolling update behavior
  steps:
  - name: create-deployment
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: scale-deployment
    try:
    - apply:
        file: 01-scale.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - events: {}
  - name: rolling-update
    try:
    - apply:
        file: 02-rolling-update.yaml
    - assert:
        file: 02-assert.yaml
    catch:
    - podLogs:
        selector: app=nginx
        tail: 20
    - events: {}
