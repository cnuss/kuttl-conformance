# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cronjob-scheduling
spec:
  description: Validates CronJob triggers Job creation on schedule
  steps:
  - name: create-cronjob-and-verify-job
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        timeout: 90s
        resource:
          apiVersion: batch/v1
          kind: Job
    catch:
    - events: {}
