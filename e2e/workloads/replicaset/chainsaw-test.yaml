# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: replicaset
spec:
  description: Validates ReplicaSet maintains desired replica count and supports scaling
  steps:
  - name: create-replicaset
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - podLogs:
        selector: app=nginx-rs
        tail: 20
    - events: {}
  - name: scale-replicaset
    try:
    - apply:
        file: 01-scale.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - podLogs:
        selector: app=nginx-rs
        tail: 20
    - events: {}
