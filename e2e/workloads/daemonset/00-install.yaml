apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-logger
  labels:
    app: node-logger
spec:
  selector:
    matchLabels:
      app: node-logger
  template:
    metadata:
      labels:
        app: node-logger
    spec:
      terminationGracePeriodSeconds: 3
      tolerations:
        - operator: Exists
      containers:
        - name: logger
          image: busybox:1.37
          command: ["sh", "-c", "while true; do echo running on $(hostname); sleep 30; done"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
