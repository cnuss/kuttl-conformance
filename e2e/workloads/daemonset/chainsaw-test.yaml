# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: daemonset
spec:
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - script:
        timeout: 120s
        content: |
          set -e
          for i in $(seq 1 60); do
            desired=$(kubectl get daemonset node-logger -n $NAMESPACE -o jsonpath='{.status.desiredNumberScheduled}' 2>/dev/null || echo 0)
            ready=$(kubectl get daemonset node-logger -n $NAMESPACE -o jsonpath='{.status.numberReady}' 2>/dev/null || echo 0)
            if [ "$desired" -ge 1 ] && [ "$ready" -eq "$desired" ]; then
              echo "desired=$desired ready=$ready"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: desired=$desired ready=$ready"
          exit 1
