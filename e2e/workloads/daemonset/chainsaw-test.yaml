# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: daemonset
spec:
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - script:
        timeout: 120s
        content: |
          set -e
          desired=$(kubectl get daemonset node-logger -n $NAMESPACE -o jsonpath='{.status.desiredNumberScheduled}')
          ready=$(kubectl get daemonset node-logger -n $NAMESPACE -o jsonpath='{.status.numberReady}')
          test "$desired" -ge 1
          test "$ready" -eq "$desired"
