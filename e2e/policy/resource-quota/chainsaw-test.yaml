# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: resource-quota
spec:
  description: Validates ResourceQuota tracks resource consumption and enforces limits
  steps:
  - name: create-resource-quota
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-quota-usage
    try:
    - apply:
        file: 01-create-pod.yaml
    - script:
        content: |
          set -e
          used_pods=$(kubectl get resourcequota test-quota -n $NAMESPACE -o jsonpath='{.status.used.pods}')
          test "$used_pods" -eq 1
    catch:
    - events: {}
