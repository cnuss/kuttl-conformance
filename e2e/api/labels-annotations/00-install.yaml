apiVersion: v1
kind: Pod
metadata:
  name: labeled-pod
  labels:
    app: labeled-pod
    env: test
    tier: frontend
  annotations:
    description: "a test pod for label and annotation verification"
    owner: "chainsaw-conformance"
spec:
  terminationGracePeriodSeconds: 1
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
