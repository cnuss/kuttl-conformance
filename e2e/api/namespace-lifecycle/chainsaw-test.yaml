# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: namespace-lifecycle
spec:
  description: Validates namespace creation, active status verification, and deletion
  steps:
  - name: create-namespace
    try:
    - script:
        content: kubectl create namespace chainsaw-ns-test-${NAMESPACE##*-}
    - script:
        content: |
          set -e
          status=$(kubectl get namespace chainsaw-ns-test-${NAMESPACE##*-} -o jsonpath='{.status.phase}')
          test "$status" = "Active"
    catch:
    - events: {}
  - name: delete-and-verify-namespace
    try:
    - script:
        content: kubectl delete namespace chainsaw-ns-test-${NAMESPACE##*-} --wait=true --timeout=60s
    - script:
        content: |
          set -e
          if kubectl get namespace chainsaw-ns-test-${NAMESPACE##*-} 2>/dev/null; then
            echo "Namespace still exists"
            exit 1
          fi
          echo "Namespace deleted successfully"
    catch:
    - events: {}
    cleanup:
    - script:
        content: kubectl delete namespace chainsaw-ns-test-${NAMESPACE##*-} --ignore-not-found --wait=false
