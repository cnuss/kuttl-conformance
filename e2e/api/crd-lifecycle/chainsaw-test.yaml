# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: crd-lifecycle
spec:
  steps:
  - catch:
    - events:
        namespace: $NAMESPACE
    name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - script:
        content: |
          set -e
          # Wait for CRD to be fully established and API endpoint available
          for i in $(seq 1 30); do
            if kubectl get crd testwidgets.conformance.chainsaw.dev -o jsonpath='{.status.conditions[?(@.type=="Established")].status}' | grep -q True; then
              # Also verify the API endpoint is actually serving
              if kubectl get testwidgets.conformance.chainsaw.dev -n $NAMESPACE 2>/dev/null; then
                echo "CRD established and API ready"
                exit 0
              fi
            fi
            sleep 1
          done
          echo "CRD not established in time"
          exit 1
  - catch:
    - events:
        namespace: $NAMESPACE
    name: step-01
    try:
    - apply:
        file: 01-create-cr.yaml
    - assert:
        file: 01-assert.yaml
  - catch:
    - events:
        namespace: $NAMESPACE
    name: step-02
    try:
    - apply:
        file: 02-update-cr.yaml
    - assert:
        file: 02-assert.yaml
  - name: step-03
    try:
    - delete:
        ref:
          apiVersion: conformance.chainsaw.dev/v1
          kind: TestWidget
          name: my-widget
    - error:
        file: 03-errors.yaml
  - catch:
    - events:
        namespace: $NAMESPACE
    name: step-04
    try:
    - script:
        content: |
          set -e
          kubectl delete crd testwidgets.conformance.chainsaw.dev --ignore-not-found
    - script:
        content: |
          set -e
          if kubectl get crd testwidgets.conformance.chainsaw.dev 2>/dev/null; then
            echo "CRD still exists"
            exit 1
          fi
