# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: finalizers
spec:
  description: Validates that finalizers block resource deletion until removed
  steps:
  - name: create-finalized-resource
    try:
    - apply:
        file: 00-install.yaml
    - script:
        content: |
          set -e
          # Verify the finalizer is present
          finalizers=$(kubectl get configmap finalized-config -n $NAMESPACE -o jsonpath='{.metadata.finalizers[0]}')
          test "$finalizers" = "chainsaw.dev/test-finalizer"
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-finalizer-blocks-deletion
    try:
    - script:
        content: kubectl delete configmap finalized-config -n $NAMESPACE --wait=false
    - script:
        content: |
          set -e
          # Verify the ConfigMap still exists (finalizer blocks deletion)
          kubectl get configmap finalized-config -n $NAMESPACE
          # Verify it has a deletionTimestamp
          ts=$(kubectl get configmap finalized-config -n $NAMESPACE -o jsonpath='{.metadata.deletionTimestamp}')
          test -n "$ts"
    catch:
    - events: {}
  - name: remove-finalizer-and-verify-deletion
    try:
    - script:
        content: |
          set -e
          kubectl patch configmap finalized-config -n $NAMESPACE --type=merge -p '{"metadata":{"finalizers":[]}}'
          kubectl wait --for=delete configmap/finalized-config -n $NAMESPACE --timeout=30s
    cleanup:
    - script:
        content: kubectl patch configmap finalized-config -n $NAMESPACE --type=merge -p '{"metadata":{"finalizers":[]}}' || true
