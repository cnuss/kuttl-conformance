# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: node-selector
spec:
  description: Validates nodeSelector schedules pods to matching nodes and rejects non-matching selectors
  steps:
  - name: wait-for-sa
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: default
  - name: verify-matching-selector
    try:
    - script:
        content: |
          set -e

          # Wait for a Ready node, then discover its hostname label
          for i in $(seq 1 30); do
            hostname=$(kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.labels.kubernetes\.io/hostname}{"\t"}{range .status.conditions[*]}{.type}={.status}{"\t"}{end}{"\n"}{end}' | grep 'Ready=True' | head -1 | cut -f1)
            if [ -n "$hostname" ]; then break; fi
            sleep 1
          done
          test -n "$hostname" || { echo "no Ready node found after 30s"; exit 1; }
          cat <<EOF | kubectl apply -n $NAMESPACE -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: node-selector-match
            labels:
              app: node-selector-match
          spec:
            tolerations:
              - operator: Exists
            nodeSelector:
              kubernetes.io/hostname: "$hostname"
            containers:
              - name: nginx
                image: nginx:1.27
          EOF
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-non-matching-selector
    try:
    - apply:
        file: 01-install.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - events: {}
