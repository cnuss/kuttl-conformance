# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: priority-class
spec:
  description: Validates PriorityClass assignment and priority value propagation to pods
  steps:
  - name: create-and-verify-priority
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    - script:
        content: |
          set -e
          priority=$(kubectl get pod priority-pod -n $NAMESPACE -o jsonpath='{.spec.priority}')
          test "$priority" -eq 1000
    catch:
    - events: {}
    finally:
    - script:
        content: kubectl delete priorityclass test-priority --ignore-not-found
