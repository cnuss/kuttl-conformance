# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: priority-class
spec:
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - script:
        content: |
          set -e
          priority=$(kubectl get pod priority-pod -n $NAMESPACE -o jsonpath='{.spec.priority}')
          test "$priority" -eq 1000
    - assert:
        file: 00-assert.yaml
