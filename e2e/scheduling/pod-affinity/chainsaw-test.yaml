# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: pod-affinity
spec:
  description: Validates pod affinity co-locates pods and anti-affinity keeps them on separate nodes
  steps:
  - name: create-target-pod
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-affinity-colocation
    try:
    - apply:
        file: 01-install.yaml
    - assert:
        file: 01-assert.yaml
    - script:
        content: |
          set -e
          target_node=$(kubectl get pod target -n $NAMESPACE -o jsonpath='{.spec.nodeName}')
          affinity_node=$(kubectl get pod affinity-pod -n $NAMESPACE -o jsonpath='{.spec.nodeName}')
          test -n "$target_node"
          test "$target_node" = "$affinity_node"
    catch:
    - events: {}
  - name: verify-anti-affinity
    try:
    - apply:
        file: 02-install.yaml
    - assert:
        file: 02-assert.yaml
    catch:
    - events: {}
