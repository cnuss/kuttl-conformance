# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: taints-tolerations
spec:
  description: Validates taints block scheduling for intolerant pods and tolerations allow scheduling
  steps:
  - name: verify-taint-and-toleration-behavior
    try:
    - script:
        content: |
          set -e
          node=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')

          # Add taint
          kubectl taint nodes "$node" test-taint=true:NoSchedule

          # Create pod WITHOUT toleration — should stay Pending
          cat <<YAML | kubectl apply -n $NAMESPACE -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: no-toleration
          spec:
            containers:
              - name: nginx
                image: nginx:1.27
          YAML

          # Poll until pod is in Pending phase (instead of fixed sleep)
          for i in $(seq 1 15); do
            phase=$(kubectl get pod no-toleration -n $NAMESPACE -o jsonpath='{.status.phase}' 2>/dev/null) || true
            if [ "$phase" = "Pending" ]; then
              break
            fi
            sleep 1
          done
          echo "no-toleration phase: $phase"
          if [ "$phase" != "Pending" ]; then
            echo "FAIL: expected Pending, got $phase"
            exit 1
          fi

          # Create pod WITH toleration — should schedule and run
          cat <<YAML | kubectl apply -n $NAMESPACE -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: with-toleration
          spec:
            tolerations:
              - key: test-taint
                operator: Equal
                value: "true"
                effect: NoSchedule
            containers:
              - name: nginx
                image: nginx:1.27
          YAML

          # Wait for tolerated pod to be Running
          kubectl wait --for=condition=Ready pod/with-toleration -n $NAMESPACE --timeout=60s

          # Remove taint
          kubectl taint nodes "$node" test-taint=true:NoSchedule-

          # Final verification
          phase=$(kubectl get pod with-toleration -n $NAMESPACE -o jsonpath='{.status.phase}')
          echo "with-toleration phase: $phase"
          test "$phase" = "Running"

          # Verify taint is gone
          taint_check=$(kubectl get node "$node" -o jsonpath='{.spec.taints[?(@.key=="test-taint")].key}')
          test -z "$taint_check"
          echo "Taint removed successfully"
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
    finally:
    - script:
        content: |
          node=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          kubectl taint nodes "$node" test-taint=true:NoSchedule- || true
