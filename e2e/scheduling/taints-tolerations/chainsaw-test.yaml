# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: taints-tolerations
spec:
  steps:
  - name: step-00
    try:
    - script:
        content: |
          set -e
          node=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')

          # Add taint
          kubectl taint nodes "$node" test-taint=true:NoSchedule

          # Create pod WITHOUT toleration — should stay Pending
          cat <<YAML | kubectl apply -n $NAMESPACE -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: no-toleration
          spec:
            containers:
              - name: nginx
                image: nginx:1.27
          YAML

          sleep 3
          phase=$(kubectl get pod no-toleration -n $NAMESPACE -o jsonpath='{.status.phase}')
          echo "no-toleration phase: $phase"
          if [ "$phase" != "Pending" ]; then
            kubectl taint nodes "$node" test-taint=true:NoSchedule- || true
            echo "FAIL: expected Pending, got $phase"
            exit 1
          fi

          # Create pod WITH toleration — should schedule and run
          cat <<YAML | kubectl apply -n $NAMESPACE -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: with-toleration
          spec:
            tolerations:
              - key: test-taint
                operator: Equal
                value: "true"
                effect: NoSchedule
            containers:
              - name: nginx
                image: nginx:1.27
          YAML

          # Wait for tolerated pod to be Running
          for i in $(seq 1 30); do
            phase=$(kubectl get pod with-toleration -n $NAMESPACE -o jsonpath='{.status.phase}')
            if [ "$phase" = "Running" ]; then
              break
            fi
            sleep 2
          done

          # Remove taint immediately
          kubectl taint nodes "$node" test-taint=true:NoSchedule-

          # Final verification
          phase=$(kubectl get pod with-toleration -n $NAMESPACE -o jsonpath='{.status.phase}')
          echo "with-toleration phase: $phase"
          test "$phase" = "Running"

          # Verify taint is gone
          taint_check=$(kubectl get node "$node" -o jsonpath='{.spec.taints[?(@.key=="test-taint")].key}')
          test -z "$taint_check"
          echo "Taint removed successfully"
    - assert:
        file: 00-assert.yaml
