# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: secret-mount
spec:
  description: Validates Secret volume mount exposes secret data as read-only files in pods
  steps:
  - name: create-and-verify-secret-mount
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - podLogs:
        name: secret-reader
        tail: 20
