apiVersion: v1
kind: Pod
metadata:
  name: hostpath-checker
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          test -d /host-data
          echo "hostpath-content" > /host-data/testfile
          test "$(cat /host-data/testfile)" = "hostpath-content"
          echo "overwritten" > /host-data/testfile
          test "$(cat /host-data/testfile)" = "overwritten"
          mkdir -p /host-data/subdir
          echo "nested" > /host-data/subdir/nested.txt
          test "$(cat /host-data/subdir/nested.txt)" = "nested"
      volumeMounts:
        - name: hostpath-vol
          mountPath: /host-data
  volumes:
    - name: hostpath-vol
      hostPath:
        path: /tmp/chainsaw-hostpath-test
        type: DirectoryOrCreate
