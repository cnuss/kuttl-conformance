apiVersion: v1
kind: Pod
metadata:
  name: shared-volume-pod
spec:
  restartPolicy: Never
  initContainers:
    - name: writer
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          count=$(ls -a /shared | grep -v '^\.\.\?$' | wc -l)
          test "$count" -eq 0
          echo "shared-data-from-init" > /shared/data.txt
          sha256sum /shared/data.txt > /shared/data.txt.sha256
      volumeMounts:
        - name: shared
          mountPath: /shared
  containers:
    - name: reader
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          # Verify init data
          test "$(cat /shared/data.txt)" = "shared-data-from-init"
          cd /shared && sha256sum -c data.txt.sha256

          # Signal to sidecar
          echo "reader-was-here" > /shared/reader.txt

          # Wait for sidecar's signal
          for i in $(seq 1 30); do
            test -f /shared/sidecar.txt && break
            sleep 1
          done
          test "$(cat /shared/sidecar.txt)" = "sidecar-was-here"
      volumeMounts:
        - name: shared
          mountPath: /shared
    - name: sidecar
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          # Verify init data
          test "$(cat /shared/data.txt)" = "shared-data-from-init"

          # Signal to reader
          echo "sidecar-was-here" > /shared/sidecar.txt

          # Wait for reader's signal
          for i in $(seq 1 30); do
            test -f /shared/reader.txt && break
            sleep 1
          done
          test "$(cat /shared/reader.txt)" = "reader-was-here"
      volumeMounts:
        - name: shared
          mountPath: /shared
  volumes:
    - name: shared
      emptyDir: {}
