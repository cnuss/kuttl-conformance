apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-key-config
data:
  app.conf: "app-config-content"
  db.conf: "db-config-content"
  logging.conf: "logging-config-content"
---
apiVersion: v1
kind: Pod
metadata:
  name: subpath-pod
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          test "$(cat /etc/app/app.conf)" = "app-config-content"
          test "$(cat /etc/app/db.conf)" = "db-config-content"
          test "$(cat /etc/app/logging.conf)" = "logging-config-content"
          test "$(ls /etc/app/ | wc -l)" -eq 3
          for f in app.conf db.conf logging.conf; do
            ! test -L "/etc/app/$f"
          done
      volumeMounts:
        - name: config
          mountPath: /etc/app/app.conf
          subPath: app.conf
        - name: config
          mountPath: /etc/app/db.conf
          subPath: db.conf
        - name: config
          mountPath: /etc/app/logging.conf
          subPath: logging.conf
  volumes:
    - name: config
      configMap:
        name: multi-key-config
