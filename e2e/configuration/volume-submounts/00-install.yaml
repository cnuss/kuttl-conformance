apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-key-config
data:
  app.conf: "app-config-content"
  db.conf: "db-config-content"
  logging.conf: "logging-config-content"
---
apiVersion: v1
kind: Pod
metadata:
  name: subpath-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e

          # Verify each subPath file has exact expected content
          test "$(cat /etc/app/app.conf)" = "app-config-content"
          test "$(cat /etc/app/db.conf)" = "db-config-content"
          test "$(cat /etc/app/logging.conf)" = "logging-config-content"

          # Verify ONLY the subPath files exist — no configmap directory artifacts
          file_count=$(ls /etc/app/ | wc -l)
          test "$file_count" -eq 3 || { echo "FAIL: expected 3 files, found $file_count: $(ls /etc/app/)"; exit 1; }

          # subPath mounts are individual files, NOT symlinks (unlike full configmap mounts)
          for f in app.conf db.conf logging.conf; do
            if test -L "/etc/app/$f"; then
              echo "FAIL: /etc/app/$f is a symlink — subPath should mount real files"
              exit 1
            fi
          done

          echo "all subpath checks passed"
          sleep 3600
      volumeMounts:
        - name: config
          mountPath: /etc/app/app.conf
          subPath: app.conf
        - name: config
          mountPath: /etc/app/db.conf
          subPath: db.conf
        - name: config
          mountPath: /etc/app/logging.conf
          subPath: logging.conf
  volumes:
    - name: config
      configMap:
        name: multi-key-config
