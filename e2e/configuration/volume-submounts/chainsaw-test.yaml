# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: volume-submounts
spec:
  description: Validates subPath volume mounts and shared emptyDir volumes across init, main, and sidecar containers
  steps:
  - name: verify-subpath-mounts
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-shared-volume-coordination
    try:
    - apply:
        file: 01-install.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - events: {}
