apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    pod: subpath-pod
    tail: 20
commands:
  - script: |
      set -e
      kubectl exec subpath-pod -n $NAMESPACE -- test -f /etc/app/app.conf
      kubectl exec subpath-pod -n $NAMESPACE -- test -f /etc/app/db.conf
      kubectl exec subpath-pod -n $NAMESPACE -- test -f /etc/app/logging.conf
      file_count=$(kubectl exec subpath-pod -n $NAMESPACE -- ls /etc/app/ | wc -l)
      test "$file_count" -eq 3 || { echo "FAIL: expected 3 files, found $file_count"; exit 1; }
