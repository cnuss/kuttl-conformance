# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: persistent-volume-claim
spec:
  description: Validates PersistentVolumeClaim binding and data persistence across pod mounts
  steps:
  - name: create-and-verify-pvc
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - podLogs:
        name: pvc-writer
        tail: 20
    - events: {}
