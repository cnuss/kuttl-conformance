# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: serviceaccount-token
spec:
  description: Validates ServiceAccount token projection and audience verification in pods
  steps:
  - name: create-serviceaccount
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: create-token-pod
    try:
    - apply:
        file: 01-install.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - events: {}
  - name: verify-token-contents
    try:
    - apply:
        file: 02-install.yaml
    - assert:
        file: 02-assert.yaml
    catch:
    - events: {}
