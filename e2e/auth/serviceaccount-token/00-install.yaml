apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-with-token
automountServiceAccountToken: true
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-with-token
spec:
  restartPolicy: Never
  serviceAccountName: sa-with-token
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          test -f /var/run/secrets/kubernetes.io/serviceaccount/token
          test -f /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          test -f /var/run/secrets/kubernetes.io/serviceaccount/namespace
