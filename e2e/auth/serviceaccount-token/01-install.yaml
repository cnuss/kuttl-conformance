apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-no-token
automountServiceAccountToken: false
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-no-token
spec:
  restartPolicy: Never
  serviceAccountName: sa-no-token
  automountServiceAccountToken: false
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          ! test -f /var/run/secrets/kubernetes.io/serviceaccount/token
