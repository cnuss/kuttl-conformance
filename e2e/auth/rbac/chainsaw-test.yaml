# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: rbac
spec:
  description: Validates Role and RoleBinding restrict ServiceAccount access to permitted resources only
  steps:
  - name: create-rbac-resources
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - events: {}
  - name: verify-access-control
    try:
    - script:
        content: |
          for i in $(seq 1 30); do
            if kubectl get service kubernetes -n default -o yaml; then
              exit 0
            fi
            sleep 1
          done
          echo "kubernetes service not found after 30s"
          exit 1
    - apply:
        file: 01-verify-access.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - podLogs:
        name: rbac-verifier
        tail: 30
