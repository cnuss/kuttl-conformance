apiVersion: v1
kind: Pod
metadata:
  name: ns-lister-verifier
spec:
  serviceAccountName: ns-lister
  restartPolicy: Never
  containers:
    - name: verifier
      # bitnami/kubectl only publishes :latest (no versioned tags)
      # official registry.k8s.io/kubectl is distroless (no shell)
      image: bitnami/kubectl:latest
      command: ["sh", "-c"]
      args:
        - |
          set -e
          echo "Testing: list namespaces with ClusterRole..."
          kubectl get namespaces
          echo "Successfully listed namespaces"
      env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
