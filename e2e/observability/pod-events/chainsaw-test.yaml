# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: pod-events
spec:
  steps:
  - catch:
    - podLogs:
        name: event-checker
        tail: 20
    - events: {}
    name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    - script:
        content: |
          set -e
          events=$(kubectl get events -n $NAMESPACE --field-selector involvedObject.name=event-checker --no-headers)
          echo "$events" | grep -q "Scheduled"
          echo "$events" | grep -q "Pull"
          echo "$events" | grep -q "Created"
          echo "$events" | grep -q "Started"
